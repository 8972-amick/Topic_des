<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Log</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="first">
        <p>Learning Log</p>
      </div>

      <div class="browser-bar">
        <i class="fa-solid fa-arrow-left"></i>
        <i class="fa-solid fa-arrow-right"></i>
        <i class="fa-solid fa-xmark"></i>
        <i class="fa-solid fa-house"></i>

        <input type="text" placeholder="search..." />

        <div class="user">
          <span>Username</span>
          <button>LogOut</button>
        </div>
      </div>
      <!-- Topic Header -->
      <div class="header">
        <h2 class="header-h">Topic Lists</h2>
        <button>+ Add Topic</button>
      </div>

      <!-- Search -->
      <div class="search">
        <label>Topic:</label>
        <input type="text" placeholder="search" />
        <button>Search</button>
      </div>
      <!-- Topics -->
      <div class="topics">
        <div class="topic">
          <span>1. Add Topic</span>
          <div>
            <button>Edit</button>
            <button>Delete</button>
          </div>
        </div>

        <div class="topic">
          <span>2. View Topic</span>
          <div>
            <button>Edit</button>
            <button>Delete</button>
          </div>
        </div>

        <div class="topic">
          <span>3. Exit</span>
          <div>
            <button>Edit</button>
            <button>Delete</button>
          </div>
        </div>
      </div>

      <footer>© Learning Log</footer>
    </div>
  </body>
</html>
